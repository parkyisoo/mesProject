<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>로그인 — MES</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 4rem auto; padding: 0 1rem; }
        h1 { font-size: 1.25rem; margin-bottom: 1.5rem; }
        label { display: block; margin-top: 0.75rem; font-size: 0.875rem; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
        button { margin-top: 1.25rem; padding: 0.5rem 1rem; cursor: pointer; }
        .error { color: #b91c1c; margin-top: 1rem; font-size: 0.875rem; }
    </style>
</head>
<body>
<h1>MES 로그인</h1>
<form th:action="@{/login}" method="post">
    <label for="username">아이디</label>
    <input id="username" name="username" type="text" autocomplete="username" required/>

    <label for="password">비밀번호</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required/>

    <button type="submit">로그인</button>
</form>
<p class="error" th:if="${error != null}" th:text="${error}">에러 메시지</p>
<p th:if="${error != null and session.userId != null}">
    <a th:href="@{/logout}">로그아웃 후 다시 로그인</a>
</p>
</body>
</html>
