<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>대시보드 — MES</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; }
        h1 { font-size: 1.35rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin: 1.25rem 0; }
        .card { border: 1px solid #d4d4d8; border-radius: 8px; padding: 1rem; background: #fafafa; }
        .card h2 { margin: 0 0 0.5rem; font-size: 0.8rem; color: #52525b; font-weight: 600; }
        .card .num { font-size: 1.75rem; font-weight: 700; }
        .section-title { margin-top: 2rem; font-size: 1.05rem; }
        table { border-collapse: collapse; width: 100%; max-width: 720px; margin-top: 0.75rem; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #f4f4f5; }
        tr.warn { background: #fef2f2; color: #991b1b; font-weight: 600; }
        .kpi-link { margin-top: 2rem; }
        .kpi-link a { display: inline-block; padding: 0.5rem 1rem; background: #18181b; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: main}"></div>

<h1>대시보드</h1>

<h2 class="section-title">오늘 작업지시 현황 (예정일 기준)</h2>
<div class="grid">
    <div class="card"><h2>OPEN</h2><p class="num" th:text="${dashboard.workOrdersOpenToday}">0</p></div>
    <div class="card"><h2>IN_PROGRESS</h2><p class="num" th:text="${dashboard.workOrdersInProgressToday}">0</p></div>
    <div class="card"><h2>DONE</h2><p class="num" th:text="${dashboard.workOrdersDoneToday}">0</p></div>
    <div class="card"><h2>ON_HOLD</h2><p class="num" th:text="${dashboard.workOrdersOnHoldToday}">0</p></div>
</div>

<h2 class="section-title">전체 LOT 상태</h2>
<div class="grid">
    <div class="card"><h2>WAITING</h2><p class="num" th:text="${dashboard.lotsWaiting}">0</p></div>
    <div class="card"><h2>IN_PROGRESS</h2><p class="num" th:text="${dashboard.lotsInProgress}">0</p></div>
    <div class="card"><h2>COMPLETED</h2><p class="num" th:text="${dashboard.lotsCompleted}">0</p></div>
    <div class="card"><h2>ON_HOLD</h2><p class="num" th:text="${dashboard.lotsOnHold}">0</p></div>
</div>

<div class="card" style="max-width:320px;margin-top:1rem;">
    <h2>오늘 수율 (production_results)</h2>
    <p class="num"><span th:text="${dashboard.todayYieldPercent}">0</span>%</p>
</div>

<h2 class="section-title">불량률 5% 초과 LOT (오늘 실적 기준)</h2>
<table>
    <thead>
    <tr>
        <th>LOT번호</th>
        <th>양품</th>
        <th>불량</th>
        <th>불량률</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="w : ${dashboard.defectWarningLots}" class="warn">
        <td th:text="${w.lotNumber}">LOT</td>
        <td th:text="${w.goodQty}">0</td>
        <td th:text="${w.defectQty}">0</td>
        <td th:text="|${w.defectRatePercent}%|">5%</td>
    </tr>
    <tr th:if="${#lists.isEmpty(dashboard.defectWarningLots)}">
        <td colspan="4">해당 LOT이 없습니다.</td>
    </tr>
    </tbody>
</table>

<p class="kpi-link" th:if="${session.role == 'ADMIN' or session.role == 'OPERATOR' or session.role == 'QC'}">
    <a th:href="@{/kpi}">KPI 리포트</a>
</p>
</body>
</html>
