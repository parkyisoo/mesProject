<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>KPI — MES</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; }
        h1 { font-size: 1.35rem; }
        form.filter { margin: 1rem 0; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end; }
        form.filter label { display: flex; flex-direction: column; font-size: 0.8rem; gap: 0.25rem; }
        form.filter input { padding: 0.4rem; }
        form.filter button { padding: 0.45rem 1rem; cursor: pointer; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin: 1.25rem 0; }
        .card { border: 1px solid #d4d4d8; border-radius: 8px; padding: 1rem; background: #fafafa; }
        .card h2 { margin: 0 0 0.35rem; font-size: 0.75rem; color: #52525b; text-transform: uppercase; }
        .card .val { font-size: 1.5rem; font-weight: 700; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; margin: 2rem 0; }
        .chart-box { min-height: 280px; }
        table { border-collapse: collapse; width: 100%; max-width: 640px; margin-top: 0.75rem; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #f4f4f5; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div th:replace="~{fragments/nav :: main}"></div>

<h1>KPI 리포트</h1>
<p style="color:#71717a;font-size:0.875rem;">
    조회 기간: <span th:text="${kpi.rangeStart}">2025-01-01</span> ~ <span th:text="${kpi.rangeEnd}">2025-01-01</span>
    (실적 기준: <code>production_results.input_at</code>, LOT 완료율: 해당 기간 생성 LOT)
</p>

<form class="filter" th:action="@{/kpi}" method="get">
    <label>시작일
        <input type="date" name="startDate" th:value="${kpi.rangeStart}"/>
    </label>
    <label>종료일
        <input type="date" name="endDate" th:value="${kpi.rangeEnd}"/>
    </label>
    <button type="submit">조회</button>
</form>

<div class="cards">
    <div class="card"><h2>수율</h2><p class="val"><span th:text="${kpi.yieldPercent}">0</span>%</p></div>
    <div class="card"><h2>불량률</h2><p class="val"><span th:text="${kpi.defectRatePercent}">0</span>%</p></div>
    <div class="card"><h2>UPH</h2><p class="val" th:text="${kpi.uph}">0</p></div>
    <div class="card"><h2>LOT 완료율</h2><p class="val"><span th:text="${kpi.lotCompletionRatePercent}">0</span>%</p></div>
</div>

<div class="charts">
    <div class="chart-box">
        <h2 style="font-size:1rem;">공정별 수율 (%)</h2>
        <canvas id="processBar"></canvas>
    </div>
    <div class="chart-box">
        <h2 style="font-size:1rem;">불량 유형별 수량</h2>
        <canvas id="defectPie"></canvas>
    </div>
</div>

<h2 style="font-size:1rem;margin-top:2rem;">일별 실적</h2>
<table>
    <thead>
    <tr>
        <th>일자</th>
        <th>양품수량</th>
        <th>불량수량</th>
        <th>수율</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${kpi.dailyRows}">
        <td th:text="${row.date}">2025-01-01</td>
        <td th:text="${row.goodQty}">0</td>
        <td th:text="${row.defectQty}">0</td>
        <td th:text="|${row.yieldPercent}%|">0%</td>
    </tr>
    <tr th:if="${#lists.isEmpty(kpi.dailyRows)}">
        <td colspan="4">해당 기간 실적이 없습니다.</td>
    </tr>
    </tbody>
</table>

<script id="kpi-bar-data" type="application/json" th:text="${barChartJson}"></script>
<script id="kpi-pie-data" type="application/json" th:text="${pieChartJson}"></script>
<script>
(function () {
    const barEl = document.getElementById('kpi-bar-data');
    const pieEl = document.getElementById('kpi-pie-data');
    const bar = barEl && barEl.textContent ? JSON.parse(barEl.textContent) : {labels: [], data: []};
    const pie = pieEl && pieEl.textContent ? JSON.parse(pieEl.textContent) : {labels: [], data: []};

    const ctxBar = document.getElementById('processBar');
    if (ctxBar) {
        new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: bar.labels || [],
                datasets: [{
                    label: '수율 (%)',
                    data: bar.data || [],
                    backgroundColor: 'rgba(59, 130, 246, 0.6)',
                    borderColor: 'rgb(37, 99, 235)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true, max: 100 } }
            }
        });
    }

    const ctxPie = document.getElementById('defectPie');
    if (ctxPie) {
        new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: pie.labels || [],
                datasets: [{
                    data: pie.data || [],
                    backgroundColor: [
                        '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b'
                    ]
                }]
            },
            options: { responsive: true }
        });
    }
})();
</script>
</body>
</html>
